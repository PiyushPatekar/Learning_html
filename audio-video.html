<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-video Example</title>
</head>

<body>
    <h2>Audio Example</h2>
    <audio controls autoplay>
        <source src="Docs/Video_example_MP4.mp4.mp4" type="audio/mp3"/>
    </audio>
    
    <video controls autoplay loop muted>
        <source src="Docs/Video_example_MP4.mp4.mp4" type="video.mp4"/>
    </video>
    
</body>
</html>
