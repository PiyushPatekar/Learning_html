<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Input types</title>
    </head>
    <body>

        <form>
        <h1>All Input Types Examples</h1>

        <label>Enter Name</label>
        <input type="text" placeholder="Enter your name"/><br><br>

        <label>Enter Email</label>
        <input type="email" placeholder="Enter Email"/><br><br>

        <label>Enter Number</label>
        <input type="number" placeholder="Enter Phone Number"/><br><br>

        <label> Enter DOB</label>
        <input type="date"/><br><br>

        <label>Enter Password</label>
        <input type="password" placeholder="Enter Password"/><br><br>

        <label>Enter Month</label>
        <input type="month"/>

        <label>Enter Week</label>
        <input type="week"/>

        <label>Enter Time</label>
        <input type="time"/>

        <label>Enter Date & Time</label>
        <input type="datetime-local"/><br><br>

        <label>Select Range</label>
        <input type="range"/><br><br>

        <label>Choose Cities</label>
        <input type="checkbox" checked/> Mumbai
        <input type="checkbox" /> Pune
        <input type="checkbox" /> Nashik
        <input type="checkbox" /> Akola<br><br>

        <label>Select Gender</label>
        <input type="radio" name="gender"/>Male
        <input type="radio" name="gender"/>Female
        <input type="radio" name="gender"/>Other<br><br>

        <label>Upload Document</label>
        <input type="file" multiple/><br><br>

        <label>Select Color</label>
        <input type="color"/><br><br>

        <label>Select You Fav Dish</label>
        <select>
            <option>Choose...</option>
            <option>Biryani</option>
            <option>Puran Poli</option>
            <option>Tandoor</option>
            <option>Burger</option>
            <option>Manchurian</option>
            <option>Mutton Rassa</option>
            <option>Soyachap</option>
        </select><br><br>

        <label>Enter Address</label>
        <textarea placeholder="Enter full Address"></textarea><br><br><br>

        <input type="submit" value="Submit"/>
        <input type="button" value="Submit"/>
        <input type="reset" value="Reset"/>


        </form><hr>

        <h1>Student Registration Form</h1>

        <form>

            <label>Enter Name: </label>
            <input type="text" placeholder="Enter Full Name"/><br><br>

            <label>Enter Number: </label>
            <input type="number" placeholder="Enter Number"/><br><br>

            <label>Enter Email: </label>
            <input type="email" placeholder="Enter Email"/><br><br>

            <label>Enter Password:</label>
            <input type="password"/><br><br>

            <label>Select Gender: </label>
            <input type="radio" name="gender"/>Male
            <input type="radio" name="gender"/>Female
            <input type="radio" name="gender"/>Other<br><br>

            <label>Choose Hobbies: </label>
            <input type="checkbox"/>Reading
            <input type="checkbox"/>Sports
            <input type="checkbox"/>Music<br><br>

            <label>Select City: </label>
            <select>
                <option>Select</option>
                <option>Pune</option>
                <option>Akola</option>
                <option>Satara</option>
                <option>Beed</option>
                <option>Aurangabad</option>
                <option>Shegaon</option>
            </select><br><br>

            <label>Full Address: </label>
            <textarea placeholder="Enter Full Address"></textarea><br><br>

            <input type="button" value="Submit"/>
            <input type="reset" value="Reset"/>


        </form>
    </body>
</html>
